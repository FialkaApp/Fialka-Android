# ============================================================
# Fialka Android — CI/CD Workflow
# ============================================================
# Triggers:
#   - Push to main branch  → Rust build + unit tests + debug APK
#   - Push of a tag v*     → Rust build + unit tests + unsigned release APK (artifact)
#
# NO secrets required. Signing is done locally by the developer.
# See scripts/release.ps1 for the local signing + publish workflow.
# ============================================================

name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout + submodules ──────────────────────────────────────────
      - name: Checkout repository + Fialka-Core submodule
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Rust toolchain ─────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Fialka-Core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Fialka-Core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── 4. Android NDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # ── 5. Build Fialka-Core .so files ───────────────────────────────────
      - name: Build libfialka_core.so (arm64-v8a + x86_64)
        working-directory: Fialka-Core
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t x86_64 \
            -o ../app/src/main/jniLibs \
            build --release

      # ── 6. Unit tests ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # ── 7. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK (branch push)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleDebug

      - name: Build unsigned release APK (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease

      # ── 8. Upload unsigned APK as artifact ────────────────────────────────
      # Developer downloads this artifact, signs locally with apksigner,
      # then publishes with scripts/release.ps1
      - name: Upload unsigned APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: fialka-unsigned-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
