# ============================================================
# Fialka Android — CI/CD Workflow
# ============================================================
# Triggers:
#   - Push to main branch  → Rust build + unit tests + debug APK
#   - Push of a tag v*     → Rust build + unit tests + unsigned release APK (artifact)
#
# NO secrets required. Signing is done locally by the developer.
# See scripts/release.py for the local signing + publish workflow.
#
# Monero static libs (external-libs/) are cached by Dockerfile hash.
# Cache miss triggers a full Docker rebuild (~2h arm64 + ~30min x86_64).
# ============================================================

name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout + submodules ──────────────────────────────────────────
      - name: Checkout repository + Fialka-Core submodule
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Rust toolchain ─────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Fialka-Core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Fialka-Core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── 4. Android NDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK 27.2.12479018
        run: sdkmanager "ndk;27.2.12479018"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # ── 5. Build Fialka-Core .so files ───────────────────────────────────
      - name: Build libfialka_core.so (arm64-v8a + x86_64)
        working-directory: Fialka-Core
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t x86_64 \
            -o ../app/src/main/jniLibs \
            build --release

      # ── 6. Monero static libs (cached by Dockerfile hash) ─────────────────
      # Cache key: hash of both Dockerfiles + MONERO_TAG from Makefile
      # Cache miss = full Docker rebuild (~2h arm64 + ~30min x86_64)
      - name: Cache Monero static libs
        id: cache-monero
        uses: actions/cache@v5
        with:
          path: |
            external-libs/arm64-v8a
            external-libs/x86_64
            external-libs/include
          key: monero-libs-${{ hashFiles('external-libs/android64.Dockerfile', 'external-libs/android64_x86.Dockerfile', 'external-libs/Makefile') }}

      - name: Build Monero static libs via Docker (cache miss only)
        if: steps.cache-monero.outputs.cache-hit != 'true'
        working-directory: external-libs
        run: make all

      # ── 7. Unit tests ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK (branch push)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleDebug

      - name: Build unsigned release APK (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease

      # ── 9. Upload unsigned APK as artifact ────────────────────────────────
      # Developer downloads this artifact, signs locally with apksigner,
      # then publishes with scripts/release.py
      - name: Upload unsigned APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: fialka-unsigned-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
